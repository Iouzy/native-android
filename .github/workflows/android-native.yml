name: Build Native Android APK

# Builds the from-scratch Kotlin/Jetpack Compose rewrite under app-native/ on
# every push that touches it. For now this only runs unit tests and uploads the
# debug APK as a validation artifact — it deliberately does NOT publish a release.
# The web app remains the shipping release; the cutover that moves the rolling
# release to this native build lands in its own phase. // PT: por agora só testa
# e publica o APK como artifact; o cutover da release fica para a sua fase.
on:
  push:
    paths:
      - "app-native/**"
      - ".github/workflows/android-native.yml"
  pull_request:
    paths:
      - "app-native/**"
      - ".github/workflows/android-native.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # Pure-JVM unit tests (domain math + pauta.v4 backup converter) gate the
      # build: a failure here stops the APK from assembling.
      - name: Run unit tests
        run: |
          cd app-native
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: |
          cd app-native
          ./gradlew :app:assembleDebug

      - name: Stage APK
        run: cp app-native/app/build/outputs/apk/debug/app-debug.apk "pauta-native-v${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pauta-native-apk
          path: pauta-native-v${{ github.run_number }}.apk
