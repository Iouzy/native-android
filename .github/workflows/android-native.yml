name: Build Native Android APK

# Builds the from-scratch Kotlin/Jetpack Compose rewrite under app-native/.
# Branch / PR pushes run the unit tests and upload the debug APK as a validation
# artifact. Pushes to main ALSO publish the APK to a rolling "latest-native"
# GitHub Release, which the in-app updater polls. This deliberately does NOT
# touch the web app's "latest" release — the native build ships on its own tag,
# so the final user-facing cutover stays a one-line, reversible change. // PT: em
# main publica a release "latest-native"; não mexe na "latest" da app web.
on:
  push:
    paths:
      - "app-native/**"
      - ".github/workflows/android-native.yml"
  pull_request:
    paths:
      - "app-native/**"
      - ".github/workflows/android-native.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # Pure-JVM unit tests (domain math + pauta.v4 backup converter) gate the
      # build: a failure here stops the APK from assembling.
      - name: Run unit tests
        run: |
          cd app-native
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest

      # Stamp the APK with this CI run number so the in-app updater can compare.
      - name: Build debug APK
        run: |
          cd app-native
          ./gradlew :app:assembleDebug -PbuildRun=${{ github.run_number }} -PbuildTs=$(date +%s)

      - name: Stage APK
        run: cp app-native/app/build/outputs/apk/debug/app-debug.apk "pauta-native-v${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pauta-native-apk
          path: pauta-native-v${{ github.run_number }}.apk

      # main only: prune the rolling release's old APK assets (incl. leftovers
      # from the earlier discarded scaffold) so it keeps a single current APK and
      # the updater never sees stale builds.
      - name: Prune old release assets
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest-native --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release view latest-native --repo "${{ github.repository }}" --json assets \
              --jq '.assets[].name' | while read -r asset; do
              gh release delete-asset latest-native "$asset" --repo "${{ github.repository }}" --yes || true
            done
          fi

      # main only: build the user-facing release notes from the commit that landed
      # on main (the squash-merge subject + body), so the in-app "Novidades" screen
      # — which renders the GitHub release body verbatim — shows what actually
      # changed instead of boilerplate. We drop the Claude Code session footer and
      # lightly tidy the first line (task-code prefix + "(#NN)" PR suffix). The
      # message is passed through an env var and never interpolated into the
      # script, so a commit message can't inject shell. // PT: notas da versão a
      # partir da mensagem do commit, para o ecrã de novidades mostrar o que mudou.
      - name: Compose release notes
        if: github.ref == 'refs/heads/main'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          notes="$(printf '%s\n' "$COMMIT_MSG" \
            | grep -v -E '^https?://claude\.ai/code/' \
            | sed -E '1 s/^[A-Z][0-9]+: //; 1 s/ \(#[0-9]+\)$//' \
            || true)"
          # Empty/footer-only message → keep a calm generic line (matches the
          # in-app fallback). // PT: mensagem vazia → linha genérica.
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            notes="Pequenas melhorias e correções."
          fi
          printf '%s\n' "$notes" > release_notes.md
          echo '----- release_notes.md -----'; cat release_notes.md

      # main only: publish the rolling native release the app updates from. The
      # asset name carries the run number; the updater parses it to decide if a
      # newer build exists. The committed debug.keystore signs every build, so
      # updates install in place without "package conflicts". The body is the
      # composed notes above (shown verbatim by the in-app updater + Novidades).
      - name: Publish to rolling "latest-native" Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-native
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: false
          name: Pauta Native ${{ github.run_number }}
          body_path: release_notes.md
          files: pauta-native-v${{ github.run_number }}.apk
          fail_on_unmatched_files: true
