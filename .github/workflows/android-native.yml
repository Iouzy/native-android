name: Build Native Android APK

# Builds the pure Kotlin/Jetpack Compose rewrite under android-native/ on every
# push that touches it. Branch pushes build + upload the APK artifact for
# validation; only main publishes the rolling "latest-native" release.
on:
  push:
    paths:
      - "android-native/**"
      - ".github/workflows/android-native.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # Pure-JVM unit tests for the ported domain math (DateUtils /
      # HabitCalculator). These need no emulator and gate the build: a failure
      # here stops the APK from assembling.
      - name: Run unit tests
        run: |
          cd android-native
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: |
          cd android-native
          ./gradlew :app:assembleDebug

      - name: Stage APK
        run: cp android-native/app/build/outputs/apk/debug/app-debug.apk "pauta-native-v${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pauta-native-apk
          path: pauta-native-v${{ github.run_number }}.apk

      - name: Publish to rolling "latest-native" Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-native
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: false
          name: Pauta Native ${{ github.run_number }}
          body: |
            Native (Kotlin/Jetpack Compose) build ${{ github.run_number }}.
            Download pauta-native-v${{ github.run_number }}.apk below and install it.
          files: pauta-native-v${{ github.run_number }}.apk
          fail_on_unmatched_files: true
